  .safetop{height:env(safe-area-inset-top)}

  /* header */
  .hdr{display:flex;align-items:center;justify-content:center;position:relative;padding:14px 16px 12px}
  .total{font-size:20px;font-weight:700;letter-spacing:.2px;font-variant-numeric:tabular-nums}
  .total.pos{color:var(--blue)} .total.neg{color:var(--red)}
  .plus{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;
    color:#cfcfcf;font-size:30px;font-weight:300;line-height:1;padding:0 8px;cursor:pointer}

  /* account block */
  .acct{padding:2px 16px 10px}
  .arow{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;font-size:16px}
  .arow .k{color:var(--lbl)} .arow .v{color:var(--txt);font-variant-numeric:tabular-nums}

  /* section header */
  .sec{background:var(--secbg);padding:6px 16px;font-size:13px;font-weight:700;color:#fafafa;
    display:flex;align-items:center;justify-content:space-between}
  .sec .dots{color:#7a7a7a;font-size:16px;letter-spacing:2px}

  /* positions */
  .poslist{}
  .pos{display:flex;align-items:center;padding:12px 16px;gap:12px}
  .pos .left{flex:1;min-width:0}
  .pos .l1{font-size:17px;line-height:1.25}
  .pos .l1 .sym{font-weight:700;color:#fff}
  .pos .l1 .dir{font-weight:500} .pos .l1 .dir.buy{color:var(--blue)} .pos .l1 .dir.sell{color:var(--red)}
  .pos .l2{font-size:15px;color:var(--sub);margin-top:3px;font-variant-numeric:tabular-nums}
  .pos .l2 .arr{padding:0 5px;color:#6f6f6f}
  .pos .pl{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
  .pos .pl.pos{color:var(--blue)} .pos .pl.neg{color:var(--red)}
  .placed{font-size:22px;font-weight:400;color:var(--blue)}

  /* bottom nav */
  .tabbar{position:fixed;left:0;right:0;bottom:0;background:var(--navbg);border-top:1px solid var(--line);
    display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:10}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    padding:8px 0 7px;color:var(--sub);cursor:pointer}
  .tab.active{color:var(--blue)}
  .tab svg{width:24px;height:24px;display:block}
  .tab span{font-size:10.5px;letter-spacing:.1px}
</style>
</head>
<body>
<div style="position:fixed;top:6px;left:8px;z-index:50;font:600 9px/1 -apple-system,Arial,sans-serif;letter-spacing:.16em;color:rgba(150,150,150,.5);pointer-events:none">SIMULATION</div>
  <div class="safetop"></div>

  <div class="hdr">
    <div class="total pos" id="total">0.00 USD</div>
    <button class="plus" aria-label="add">+</button>
  </div>

  <div class="acct" id="acct"></div>

  <div class="sec">Positions <span class="dots">···</span></div>
  <div class="poslist" id="poslist"></div>

  <nav class="tabbar">
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4v16M7 20l-3-3M7 4l3 3M17 20V4M17 4l3 3M17 20l-3-3"/></svg>
      <span>Quotes</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6v12M8 8.5h0M8 8.5a1.6 1.6 0 0 1 0 0"/><rect x="6.4" y="8.4" width="3.2" height="7.2" rx=".5"/><path d="M8 5v3.4M8 15.6V19"/><rect x="14.4" y="6.4" width="3.2" height="6" rx=".5"/><path d="M16 4v2.4M16 12.4V16"/></svg>
      <span>Chart</span>
    </div>
    <div class="tab active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="4.5" width="17" height="15" rx="2.5"/><path d="M7 14.5l3.2-3.4 2.3 2.1L17 9"/></svg>
      <span>Trade</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 12a8.5 8.5 0 1 0 2.6-6.1"/><path d="M5.5 3v3.2h3.2"/><path d="M12 8v4.3l3 1.8"/></svg>
      <span>History</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.1"/><path d="M19 12a7 7 0 0 0-.1-1.2l2-1.6-2-3.4-2.4 1a7 7 0 0 0-2-1.2L14 1h-4l-.5 2.4a7 7 0 0 0-2 1.2l-2.4-1-2 3.4 2 1.6A7 7 0 0 0 5 12a7 7 0 0 0 .1 1.2l-2 1.6 2 3.4 2.4-1a7 7 0 0 0 2 1.2L10 23h4l.5-2.4a7 7 0 0 0 2-1.2l2.4 1 2-3.4-2-1.6A7 7 0 0 0 19 12Z"/></svg>
      <span>Settings</span>
    </div>
  </nav>

<script>
(function(){
  "use strict";
  const $=s=>document.querySelector(s);

  /* ========== SHARED DETERMINISTIC TRADE ENGINE (identisch in App + Dashboard) ==========
     Alle Trades sind eine reine Funktion der Uhrzeit → jedes Gerät zeigt
     zur gleichen Sekunde exakt dieselben Positionen. */
  function makeTradeEngine(){
    function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
    function rs(k,s){return mulberry32(((k+1)*2654435761 ^ (s+1)*40503 ^ 0x9e3779b9)>>>0)();}
    const SYMS=[
      {n:'BTCUSD', d:2, base:118000, amp:0.0010, factor:1,     mpl:1500, w:3},
      {n:'ETHUSD', d:2, base:4180,   amp:0.0013, factor:10,    mpl:400,  w:2},
      {n:'SOLUSD', d:3, base:243,    amp:0.0018, factor:200,   mpl:200,  w:2},
      {n:'BNBUSD', d:2, base:712,    amp:0.0014, factor:80,    mpl:250,  w:1},
      {n:'XRPUSD', d:4, base:3.12,   amp:0.0018, factor:18000, mpl:150,  w:1},
    ];
    const POOL=[]; SYMS.forEach((s,i)=>{for(let j=0;j<s.w;j++)POOL.push(i);});
    const VOLS=[0.01,0.02,0.05,0.10,0.10,0.20,0.50,1.00,1.50,2.00];
    const GAP=55000;
    const openTime=k=>k*GAP+(rs(k,1)-0.5)*38000;
    const duration=k=>150000+rs(k,2)*90000;   // 150–240 s
    function meta(k){
      const sym=SYMS[POOL[Math.floor(rs(k,3)*POOL.length)]];
      const dir=rs(k,4)<0.6?'buy':'sell';
      const vol=VOLS[Math.floor(rs(k,5)*VOLS.length)];
      const entry=sym.base*(1+(rs(k,6)-0.5)*0.012);
      const fate=rs(k,7)<0.63?1:-1;
      const w1=0.00035+rs(k,8)*0.0006, w2=0.00012+rs(k,9)*0.00025;
      const ph1=rs(k,10)*6.283, ph2=rs(k,11)*6.283;
      return {sym,dir,vol,entry,fate,w1,w2,ph1,ph2};
    }
    function move(k,m,t){
      const amp=m.sym.amp*m.entry;
      const osc=amp*(0.6*Math.sin(t*m.w1+m.ph1)+0.4*Math.sin(t*m.w2+m.ph2));
      const ageMin=Math.min((t-openTime(k))/60000,4.2);
      return osc + m.fate*amp*(0.45+0.72*ageMin);
    }
    function posAt(k,t){
      const m=meta(k), mv=move(k,m,t), dn=m.dir==='buy'?1:-1;
      return {k, openTs:openTime(k), sym:m.sym, dir:m.dir, vol:m.vol, entry:m.entry,
        price:m.entry+dn*mv, pnl:mv*m.vol*m.sym.factor,
        sl:m.entry*(1-dn*0.011), tp1:m.entry*(1+dn*0.009), tp2:m.entry*(1+dn*0.02)};
    }
    function positions(t){
      const kc=Math.floor(t/GAP), out=[];
      for(let k=kc-9;k<=kc+3;k++){ if(k<0)continue; const o=openTime(k); if(o<=t && t<o+duration(k)) out.push(posAt(k,t)); }
      out.sort((a,b)=>a.openTs-b.openTs); return out;
    }
    const EPOCH=Date.UTC(2026,5,15), BAL_BASE=122400, BAL_RATE=2;
    function account(t){
      const pos=positions(t), floating=pos.reduce((a,p)=>a+p.pnl,0);
      const balance=BAL_BASE+((t-EPOCH)/3.6e6)*BAL_RATE;
      const equity=balance+floating, margin=pos.reduce((a,p)=>a+p.vol*p.sym.mpl,0);
      return {floating, balance, equity, margin, free:equity-margin, level:margin>0?equity/margin*100:0, count:pos.length};
    }
    return {positions, posAt, account};
  }
  const ENGINE=makeTradeEngine();

  /* ---------- formatting ---------- */
  function grp(n,dec){ // space thousands, dot decimal
    const s=Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec});
    return (n<0?'-':'')+s.replace(/,/g,' ');
  }
  const money=n=>grp(n,2);
  const px=(n,d)=>n.toFixed(d);          // Kurse ohne Tausendertrennung (wie im Original)
  const vol2=v=>v.toFixed(2);

  /* ---------- render ---------- */
  function render(){
    const t=Date.now();
    const pos=ENGINE.positions(t);
    const a=ENGINE.account(t);

    const tot=$('#total');
    tot.textContent=money(a.floating)+' USD';
    tot.className='total '+(a.floating>=0?'pos':'neg');

    $('#acct').innerHTML=[
      ['Balance:',money(a.balance)],
      ['Equity:',money(a.equity)],
      ['Margin:',money(a.margin)],
      ['Free Margin:',money(a.free)],
      ['Margin Level (%):',grp(a.level,2)],
    ].map(r=>`<div class="arow"><span class="k">${r[0]}</span><span class="v">${r[1]}</span></div>`).join('');

    $('#poslist').innerHTML=pos.map(p=>{
      const d=p.sym.d;
      const plc=p.pnl>=0?'pos':'neg';
      return `<div class="pos"><div class="left">`+
        `<div class="l1"><span class="sym">${p.sym.n}</span> <span class="dir ${p.dir}">${p.dir} ${vol2(p.vol)}</span></div>`+
        `<div class="l2">${px(p.entry,d)}<span class="arr">→</span>${px(p.price,d)}</div>`+
        `</div><div class="pl ${plc}">${money(p.pnl)}</div></div>`;
    }).join('');
  }

  render();
  setInterval(render,500);
})();
</script>
</body>
</html>
